<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT Q4 SW1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #000000; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        .login-card {
            background-color: #b6fcb6; 
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            color: #1a1a1a; 
        }

        .login-card h1 {
            text-align: center;
            margin-bottom: 20px;
            font-family: 'Press Start 2P', cursive; 
            font-size: 20px;
        }

        .login-card input {
            background-color: #ffffff;
            border: 1px solid #1a1a1a;
            color: #1a1a1a;
        }

        .login-card input::placeholder {
            color: #555555;
        }

        .login-card .btn-info {
            width: 100%;
            background-color: #4caf50; 
            border: none;
            margin-top: 15px;
        }

        .login-card .btn-info:hover {
            background-color: #45a049;
        }

        .gir-watermark {
            position: fixed;
            bottom: 10px;
            left: 10px;
            width: 80px; 
            opacity: 0.8; 
            pointer-events: none; 
        }

      
        .image-credit {
            position: fixed;
            top: 10px;  
            left: 10px;
            font-size: 6px; 
            color: #39ff14; 
            font-family: 'Press Start 2P', cursive;
        }

        .image-credit a {
            color: #39ff14;
            text-decoration: none;
        }

        .image-credit a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Login to the Alien World!</h1>

        <h5>What's Alien Name???</h5>
        <input type="text" class="form-control" id="ZimName" placeholder="Enter your alien name">
        <br>
        <h5>Insert Alien Code</h5>
        <input type="password" class="form-control" id="GIRCode" placeholder="Blerpblerpblerp">
        <br>

        <button class="btn btn-info" onclick="CheckLogin()">Verify</button>
    </div>

    <img src="https://i.pinimg.com/736x/38/5e/89/385e899c8230eb1907f7c461018859da.jpg" alt="GIR" class="gir-watermark">

    <div class="image-credit">
        Image used: <a href="https://i.pinimg.com/736x/38/5e/89/385e899c8230eb1907f7c461018859da.jpg" target="_blank">
        https://i.pinimg.com/736x/38/5e/89/385e899c8230eb1907f7c461018859da.jpg</a>
    </div>

    <script>
        function CheckLogin(){
            let zimName = document.getElementById("ZimName").value;
            let girCode = document.getElementById("GIRCode").value;

            let zimUsername = "SECRETALIENSPY21";
            let girPassword = "zimzimzim";

            let doomMessage;

            if(zimName === zimUsername && girCode === girPassword){
                doomMessage = "Welcome to the alien world <3";
            } else {
                doomMessage = "Access Denied, Human!";
            }

            alert(doomMessage);
        }
    </script>
</body>
</html>
