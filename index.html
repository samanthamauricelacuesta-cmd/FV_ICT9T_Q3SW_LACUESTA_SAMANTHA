<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invader Zim Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Pixel Font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a; /* dark space background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        .login-card {
            background-color: #b6fcb6; /* light green box */
            padding: 30px;
            border-radius: 15px;
            width: 100%;
            max-width: 400px;
            color: #1a1a1a; /* dark text for contrast */
        }

        .login-card h1 {
            text-align: center;
            margin-bottom: 20px;
            font-family: 'Press Start 2P', cursive; /* pixel font */
            font-size: 20px;
        }

        .login-card input {
            background-color: #ffffff;
            border: 1px solid #1a1a1a;
            color: #1a1a1a;
        }

        .login-card input::placeholder {
            color: #555555;
        }

        .login-card .btn-info {
            width: 100%;
            background-color: #4caf50; /* green button */
            border: none;
            margin-top: 15px;
        }

        .login-card .btn-info:hover {
            background-color: #45a049;
        }

        /* GIR watermark */
        .gir-watermark {
            position: fixed;
            bottom: 10px;
            left: 10px;
            width: 80px; /* adjust size */
            opacity: 0.8; /* semi-transparent */
            pointer-events: none; /* allows clicks to pass through */
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>Login to the Alien World!</h1>

        <h5>What's Alien Name???</h5>
        <input type="text" class="form-control" id="ZimName" placeholder="Enter your alien name">
        <br>
        <h5>Insert Alien Code</h5>
        <input type="password" class="form-control" id="GIRCode" placeholder="Blerpblerpblerp">
        <br>

        <button class="btn btn-info" onclick="CheckLogin()">Verify</button>
    </div>

    <!-- GIR watermark -->
    <img src="/mnt/data/8d8f230b-9f04-4808-90c8-f9783dc96a2c.png" alt="GIR" class="gir-watermark">

    <script>
        function CheckLogin(){
            let zimName = document.getElementById("ZimName").value;
            let girCode = document.getElementById("GIRCode").value;

            let zimUsername = "GREENGIR21";
            let girPassword = "zimzimzim";

            let doomMessage;

            if(zimName === zimUsername && girCode === girPassword){
                doomMessage = "Access Granted, Invader!";
            } else {
                doomMessage = "Access Denied, Human!";
            }

            alert(doomMessage);
        }
    </script>
</body>
</html>
